<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👤 Inici de sessió – Chapas 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <!-- Configuration & Auth -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="db.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --dark: #070c18;
      --border: rgba(255,255,255,0.08);
      --text: #f0f4ff;
      --muted: #8094b8;
      --gold: #f5c518;
      --red: #f87171;
      --radius-sm: 8px;
      --transition: 180ms ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { font-family: 'Outfit', sans-serif; cursor: pointer; }

    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
      flex-wrap: wrap;
      background: radial-gradient(ellipse at 30% 30%, rgba(96,165,250,0.07), transparent 50%),
                  radial-gradient(ellipse at 70% 70%, rgba(245,197,24,0.06), transparent 50%);
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .login-icon { font-size: 3rem; margin-bottom: 16px; }
    .login-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
    .login-subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 28px; }
    .login-field { margin-bottom: 12px; }
    .login-field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .login-field input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #f5c518, #ff9d00);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 800;
      color: #000;
      transition: all var(--transition);
      margin-bottom: 16px;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,197,24,0.35); }
    
    .btn-register {
      width: 100%;
      padding: 13px;
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.4);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      transition: all var(--transition);
      margin-bottom: 16px;
    }
    .btn-register:hover { background: rgba(96, 165, 250, 0.2); }

    .login-error { color: var(--red); font-size: 0.85rem; margin-bottom: 12px; display: none; }
    .login-back { color: var(--muted); text-decoration: none; font-size: 0.82rem; }
    .login-back:hover { color: var(--text); }
  </style>
</head>
<body>

<div id="loginScreen">
  <div id="telegramBanner" style="background:rgba(255,255,255,0.02); border:1px solid rgba(28,146,210,0.3); border-radius:32px; padding:48px; max-width:400px; width:100%; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,0.3); display:flex; flex-direction:column; align-items:center; gap:24px;">
    <div style="font-size:1.8rem; font-weight:900; color:var(--text); display:flex; flex-direction:column; align-items:center; gap:16px;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#1c92d2; filter:drop-shadow(0 4px 12px rgba(28,146,210,0.4))"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"></path></svg>
      ¡Únete al Canal!
    </div>
    <p style="font-size:1.05rem; color:var(--muted); line-height:1.6;">Escanea el código para seguir todos los resultados en directo desde Telegram y no perderte nada.</p>
    <div style="background:#fff; padding:16px; border-radius:20px; display:inline-block; box-shadow:0 12px 32px rgba(0,0,0,0.4);" id="qrcode"></div>
    <div style="font-weight:900; font-size:1.2rem; color:#1c92d2; background:rgba(28,146,210,0.1); padding:10px 24px; border-radius:99px; margin-top:8px;" id="tgChannelNameText"></div>
  </div>

  <div class="login-card">
    <div class="login-icon">⚽👤</div>
    <h1 class="login-title">Inici de sessió</h1>
    <p class="login-subtitle">Chapas del Mundial 2026</p>
    
    <div class="login-field">
      <input type="email" id="emailInput" placeholder="Correu electrònic..." autocomplete="email" />
    </div>
    <div class="login-field">
      <input type="password" id="pwInput" placeholder="Contrasenya..." autocomplete="current-password" />
    </div>
    
    <p class="login-error" id="loginError">❌ Credencials incorrectes</p>
    
    <button class="login-btn" id="loginBtn">Accedir</button>
    <button class="btn-register" id="registerBtn">Registrar-se</button>
    <br>
    <a href="index.html" class="login-back">← Tornar al lloc web</a>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const emailInput = document.getElementById('emailInput');
    const pwInput = document.getElementById('pwInput');
    const errorMsg = document.getElementById('loginError');

    // Comprovar si estem en mode Online
    if (!window.ONLINE_MODE) {
      errorMsg.textContent = '⚠️ Error: El mode Online no està configurat a firebase-config.js';
      errorMsg.style.display = 'block';
      loginBtn.disabled = true;
      loginBtn.style.opacity = '0.5';
    } else {
      // Comprovar si ja hi ha sessió
      AUTH.getCurrentUser().then(({ user, role }) => {
        if (user) {
          if (role === 'admin') window.location.href = 'admin.html';
          else window.location.href = 'apuestas.html';
        }
      });
    }

    const doLogin = async () => {
      errorMsg.style.display = 'none';
      loginBtn.textContent = 'Carregant...';
      loginBtn.disabled = true;
      registerBtn.disabled = true;
      
      try {
        const { user, role } = await AUTH.login(emailInput.value, pwInput.value);
        if (role === 'admin') window.location.href = 'admin.html';
        else window.location.href = 'apuestas.html';
      } catch (err) {
        errorMsg.textContent = '❌ ' + (err.message || 'Credencials incorrectes');
        errorMsg.style.display = 'block';
        loginBtn.textContent = 'Accedir';
        loginBtn.disabled = false;
        registerBtn.disabled = false;
      }
    };

    const doRegister = async () => {
      if (!emailInput.value || !pwInput.value) {
        errorMsg.textContent = '❌ Cal introduir correu i contrasenya per registrar-se';
        errorMsg.style.display = 'block';
        return;
      }
      if (pwInput.value.length < 6) {
        errorMsg.textContent = '❌ La contrasenya ha de tenir almenys 6 caràcters';
        errorMsg.style.display = 'block';
        return;
      }
      
      errorMsg.style.display = 'none';
      registerBtn.textContent = 'Registrant...';
      loginBtn.disabled = true;
      registerBtn.disabled = true;
      
      try {
        const { user, role } = await AUTH.register(emailInput.value, pwInput.value);
        // Després de registrar, per defecte serà 'client' i anem a apuestas
        window.location.href = 'apuestas.html';
      } catch (err) {
        errorMsg.textContent = '❌ ' + (err.message || 'Error en el registre');
        errorMsg.style.display = 'block';
        registerBtn.textContent = 'Registrar-se';
        loginBtn.disabled = false;
        registerBtn.disabled = false;
      }
    };

    loginBtn.addEventListener('click', doLogin);
    registerBtn.addEventListener('click', doRegister);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') pwInput.focus(); });

    // Render Telegram QR Hardcoded
    const channelId = '@apuestas_lenguajes';
    document.getElementById('telegramBanner').style.display = 'flex';
    document.getElementById('tgChannelNameText').textContent = channelId;
    const channelUrl = `https://t.me/${channelId.substring(1)}`;
    new QRCode(document.getElementById('qrcode'), {
      text: channelUrl,
      width: 220,
      height: 220,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });
  });
</script>

</body>
</html>
